<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional CSS can be placed here */
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md mt-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-700">Prompt Vault</h1>
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-4 rounded">
                Save Prompt
            </button>
        </div>

        <!-- Content -->
        <div class="space-y-4">
            <!-- Create Prompt Section -->
            <div class="flex items-center space-x-4">
                <div class="flex-1">
                    <h2 class="text-lg font-semibold text-gray-600">Create Prompt</h2>
                    <input type="text" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" placeholder="Enter your prompt">
                </div>
                <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-4 rounded">
                    <p class="m-0">Create</p>
                </button>
            </div>

            <!-- Image Section -->
            <div class="flex items-center space-x-4">
                <div class="w-24 h-24 bg-gray-300 rounded-lg"></div>
                <div>
                    <h3 class="text-md font-semibold text-gray-600">Image</h3>
                    <p class="text-sm text-gray-500">Select an image to associate with your prompt.</p>
                </div>
            </div>

            <!-- Other Options -->
            <div class="flex flex-col space-y-2">
                <div class="flex items-center space-x-2">
                    <label for="toggleRecommend" class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input id="toggleRecommend" type="checkbox" class="sr-only" />
                            <div class="block bg-gray-600 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition"></div>
                        </div>
                        <div class="ml-3 text-gray-700 font-medium">
                            Recommend
                        </div>
                    </label>
                </div>
                <div class="flex items-center space-x-2">
                    <label for="toggleEdit" class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input id="toggleEdit" type="checkbox" class="sr-only" />
                            <div class="block bg-gray-600 w-14 h-8 rounded-full"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition"></div>
                        </div>
                        <div class="ml-3 text-gray-700 font-medium">
                            Edit
                        </div>
                    </label>
                </div>
            </div>

            <!-- Prompt List -->
            <div id="promptContainer" class="list-container my-4"></div>

            <!-- Controls -->
            <input id="searchInput" type="text" placeholder="Search prompts..." class="input-field mt-2" />
            <div class="flex flex-wrap gap-2 mt-2">
                <button id="addPrompt" class="button bg-blue-500 text-white">Add Prompt</button>
                <button id="organizePrompt" class="button bg-blue-500 text-white">Organize</button>
                <button id="exportPrompts" class="button bg-blue-500 text-white">Export</button>
                <button id="importPrompts" class="button bg-blue-500 text-white">Import</button>
            </div>
        </div>
    </div>

    <script>
        // Additional JavaScript can be placed here
    </script>
</body>
</html>
